<!DOCTYPE html>
<html>
    <head>
        <title> Visual Novel </title>
        <link rel="stylesheet" href="MainMenu.css">

        <!-- Reusing Story Interface CSS for Main Menu -->
        <link rel="stylesheet" href="../StoryInterface/StroyInterface.css">
        <link rel="stylesheet" href="../StoryInterface/StoryAnimations.css">

        <link rel="stylesheet" href="ResponsivenessMainMenu(BETA).css"> 
        <link rel="stylesheet" href="../GameFonts/Fonts.css">

        <!--For loads CSS-->
        <link rel="stylesheet" href="MainLoad.css">
        

    </head>
    <body>  
        <!-- Code Connector kineme -->
         <script src="MainMenu.js" defer></script>
        <!-- Reusing Story Interface JS for Main Menu -->
        <div class="MainIntroPanel" id="MainIntroPanel">
            <h1 class="MainIntro1H" id="MainIntro1H"> Group 10 Dev</h1>
        </div>
        <div class="ActivateGame" id="ActivateGame">
                <h1 class="ActivateGameText" id="ActivateGameText"> Click Anywhere to Start </h1>
        </div>

        <!-- Main Menu Interface -->

        <div class="MainIntroPanel1" id="MainIntroPanel1">
            <img class="BackgroundImage" src="../OtherImages/BackgroundFadedMenu.png">
            <audio id="MainMenuMusicBackground" loop preload="auto">
                <source src="../MainMusicFiles/MainMenuBackgroundMusic.mp3" type="audio/mpeg">
            </audio>

            <audio id="MainMenuSFX1" preload="auto">
                <source src="../MainSoundEffects/dragon-studio-tv-static-323620.mp3" type="audio/mpeg">
            </audio>
            <div class="MainContainerMenu" id="MainContainerMenu">
                <h1 class="MainMenuTitle" id="MainMenuTitle"> Unspoken </h1>
                <div class="MainMenuButtons" id="MainMenuButtons">
                    <button class="MainMenuButton1" id="MainMenuButton1" onclick="PlayButtonDirect()"> Play </button>
                    <button class="MainMenuButton2" id="MainMenuButton2" onclick="OpenLoadMenu()"> Load </button>
                    <button class="MainMenuButton3" id="MainMenuButton3"> Account info </button>    
                    <button class="MainMenuButton5" id="MainMenuButton5"> Quit </button>
                </div>
            </div>
            <video class="MainMenuVideo" id="MainMenuVideo" muted loop playsinline>
                <source src="../MainVideoNovelFiles/MainInterfaceVideoPreviewIntro.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Main Menu Interface Load Settings-->
        <script src="MainLoad.js" defer></script>

        <div class="MainContainerofLoadUI" id="MainContainerofLoadUI">
            <h1 class="LoadGameH1A1" id="LoadGameH1A1">Unspoken | Load Game</h1>
            <div class="LoadGameContainer" id="LoadGameContainer">
                <button class="LoadGameButton1" id="LoadGameButton1"> Saved Slot 1 </button>
                <button class="LoadGameButton2" id="LoadGameButton2"> Saved Slot 2 </button>
                <button class="LoadGameButton3" id="LoadGameButton3"> Saved Slot 3 </button>
                <button class="LoadGameButton4" id="LoadGameButton4"> Saved Slot 4 </button>
                <button class="LoadGameButton5" id="LoadGameButton5" onclick="CloseLoadMenu()"> Go back </button>
            </div>
            <img class="ImageLoad1" src="../OtherImages/ImageTests/Test1.png">
            <img class="ImageLoad2" src="../OtherImages/ImageTests/Test2.png">
            <img class="ImageLoad3" src="../OtherImages/ImageTests/Test3.png">
            <img class="ImageLoad4" src="../OtherImages/ImageTests/Test4.png">
            <img class="ImageLoad5" src="../OtherImages/ImageTests/Test5.png">
        </div>


        <!-- Play Interface Story -->
        
        <h1 class="LoadingText" id="LoadingText"> Please wait.. </h1>
        <button class="NextStoryLineButton" id="NextStoryLineButton">Next ►</button>

        <div class="Story-Line-Choices-Panel" id="Story-Line-Choices-Panel">
            <button class="StoryLineChoice1" id="StoryLineChoice1"> Choice 1 </button>
            <button class="StoryLineChoice2" id="StoryLineChoice2"> Choice 2 </button>
        </div>
        <div class="LoadingScreenDIV" id="LoadingScreenDIV">
            <img class="HeadphoneSug" id="HeadphoneSug" src="../StoryInterface/StoryIcons/HeadphoneIcon.png">
            <h1 class="LoadingScreenText1" id="LoadingScreenText1">Wear headphones for best experience</h1>
            <h1 class="LoadingScreenText" id="LoadingScreenText">Unspoken</h1>
        </div>
        <div class="MainDialoguePanel" id="MainDialoguePanel">
            <img class="DialogueProfileIMG" id="DialogueProfileIMG" src="">
            <h1 class="DialogueCharName" id="DialogueCharName">Lyza</h1>
            <h1 class="DialogueLines" id="DialogueLines">Dialogue</h1>
        </div>
        <img class="ImageStoryVisualMain" id="ImageStoryVisualMain" src="https://i.pinimg.com/originals/c4/f0/e5/c4f0e5deee099d0c414e4f420a0e1072.gif">


        <!-- Music ELements -->
             <audio id="MainMenuSFX1" preload="auto">
                <source src="../MainSoundEffects/dragon-studio-tv-static-323620.mp3" type="audio/mpeg">
            </audio>
            <audio id="OpeningIntro1" preload="auto">
                <source src="../MainSoundEffects/IntroOpeningEffect.mp3" type="audio/mpeg">
            </audio>
            <!-- For Voice Lines -->
             <audio id="Voice1ANarrator" id="Voice1ANarrator" preload="auto">
                <source src="../StoryInterface/StoryVoiceLinesandNarrate/Line1ANarrator.m4a" type="audio/mp4">
            </audio>
        <!-- Music Elements for GAMEE-->
            <audio id="StartMusicNarr" preload="auto">
                <source src="../StoryInterface/StoryBackgroundMusic/StartEerieMusicNarrator.ogg" type="audio/ogg">
            </audio>
    </body>
</html>
